# IB Node Configuration DaemonSet for AKS InfiniBand RDMA
#
# Performs one-time host-level setup required for RDMA on AKS ND-series nodes:
#   - Loads ib_umad, rdma_ucm, ib_ucm kernel modules
#   - Persists module loading via /etc/modules-load.d
#   - Sets LimitMEMLOCK=infinity on containerd and kubelet systemd units
#     so container processes inherit an unlimited memlock rlimit, removing
#     the need for IPC_LOCK in workload pod specs
#   - Restarts containerd and kubelet to apply the memlock limit
#
# nodeSelector targets nodes labeled by nfd-network-rule (pci-15b3.present=true)
# so this only runs on IB-capable nodes, not CPU-only nodes.
#
# TODO: Remove once Nodewright (formerly Skyhook) gains AKS support and can
#       handle host-level tuning via the nvidia-tuned package. Nodewright is
#       adding AKS configs (NVIDIA/nodewright-packages#39) but RDMA/MEMLOCK
#       setup is not yet included. Track upstream progress and replace this
#       DaemonSet with a Nodewright SkyhookPackage once available.
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ib-node-config
  namespace: kube-system
  labels:
    app: ib-node-config
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
spec:
  selector:
    matchLabels:
      app: ib-node-config
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: ib-node-config
    spec:
      hostNetwork: true
      hostPID: true
      nodeSelector:
        feature.node.kubernetes.io/pci-15b3.present: "true"
      tolerations:
      - operator: Exists
      initContainers:
      - name: ib-setup
        image: busybox:1.36
        securityContext:
          privileged: true
        command:
        - sh
        - -c
        - |
          echo "=== IB Node Configuration ==="

          # Short-circuit: if all drop-ins and module configs are already present,
          # skip setup to avoid restarting kubelet/containerd and risking a restart loop.
          if nsenter -t 1 -m -u -i -n -- sh -c '
            [ -f /etc/systemd/system/containerd.service.d/memlock.conf ] &&
            [ -f /etc/systemd/system/kubelet.service.d/memlock.conf ] &&
            [ -f /etc/modules-load.d/ib-umad.conf ] &&
            [ -f /etc/security/limits.d/99-ib-memlock.conf ]
          '; then
            echo "=== All configs already present, skipping setup (idempotent exit) ==="
            exit 0
          fi

          nsenter -t 1 -m -u -i -n -- modprobe ib_umad
          nsenter -t 1 -m -u -i -n -- modprobe rdma_ucm 2>/dev/null || true
          nsenter -t 1 -m -u -i -n -- modprobe ib_ucm 2>/dev/null || true
          nsenter -t 1 -m -u -i -n -- lsmod | grep ib_umad && echo "OK: ib_umad" || echo "FAIL: ib_umad"
          nsenter -t 1 -m -u -i -n -- ls /dev/infiniband/rdma_cm && echo "OK: rdma_cm device" || echo "WARN: no rdma_cm device"

          nsenter -t 1 -m -u -i -n -- sh -c 'printf "ib_umad\nrdma_ucm\n" > /etc/modules-load.d/ib-umad.conf'
          nsenter -t 1 -m -u -i -n -- sh -c 'printf "* - memlock unlimited\nroot - memlock unlimited\n" > /etc/security/limits.d/99-ib-memlock.conf'

          nsenter -t 1 -m -u -i -n -- sh -c 'mkdir -p /etc/systemd/system/containerd.service.d && printf "[Service]\nLimitMEMLOCK=infinity\n" > /etc/systemd/system/containerd.service.d/memlock.conf'
          nsenter -t 1 -m -u -i -n -- sh -c 'mkdir -p /etc/systemd/system/kubelet.service.d && printf "[Service]\nLimitMEMLOCK=infinity\n" > /etc/systemd/system/kubelet.service.d/memlock.conf'

          nsenter -t 1 -m -u -i -n -- systemctl daemon-reload
          nsenter -t 1 -m -u -i -n -- systemctl restart containerd
          nsenter -t 1 -m -u -i -n -- systemctl restart kubelet

          sleep 10

          nsenter -t 1 -m -u -i -n -- systemctl is-active containerd && echo "OK: containerd active" || echo "FAIL: containerd"
          nsenter -t 1 -m -u -i -n -- systemctl is-active kubelet && echo "OK: kubelet active" || echo "FAIL: kubelet"

          echo "=== Setup Complete ==="
      containers:
      - name: keepalive
        image: busybox:1.36
        command:
        - sh
        - -c
        - echo IB node config active; sleep infinity
