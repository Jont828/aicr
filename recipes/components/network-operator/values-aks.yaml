# Network Operator Helm values
# AKS configuration overrides
#
# Reference: https://github.com/Azure/aks-rdma-infiniband/blob/main/configs/values/network-operator/values.yaml
# TODO: Evaluate full alignment with aks-rdma-infiniband setup scripts
#       (tests/setup-infra/deploy-aks.sh) and fold remaining automation into recipe.

nfd:
  # AICR delivers a targeted NFD NodeFeatureRule via manifest instead of the
  # chart's built-in rule. The chart's rule targets generic Ethernet NICs
  # (class 0200/0207); the manifest targets ConnectX-7 specifically (device
  # IDs 101c/101e). Disable the chart's rule to avoid the broader match.
  deployNodeFeatureRules: false
