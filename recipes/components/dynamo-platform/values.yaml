# Dynamo Platform Helm values (v1.0.1)
# NVIDIA Dynamo inference serving platform: operator and grove.
# Provides OpenAI-compatible endpoints, KV-cache-aware routing,
# disaggregated prefill/decode, and SLA-driven autoscaling.

dynamo-operator:
  # Point Dynamo to AICR's kube-prometheus-stack instance.
  # Service name derives from fullnameOverride: kube-prometheus set in
  # recipes/components/kube-prometheus-stack/values.yaml.
  dynamo:
    metrics:
      prometheusEndpoint: "http://kube-prometheus-kube-prome-prometheus.monitoring.svc.cluster.local:9090"

global:
  grove:
    # Dynamo installs and manages grove — no separate AICR component exists.
    # Required for multinode inference via PodCliqueSets (DynamoGraphDeployment).
    install: true

  kai-scheduler:
    # AICR installs kai-scheduler as a separate base component (base.yaml).
    # Do not install the bundled subchart; use the external AICR-managed instance.
    install: false
    enabled: true

  etcd:
    # Kubernetes-native discovery replaces etcd for the operator.
    install: false
